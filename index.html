
<!DOCTYPE html>
<html lang="pt-BR" style="font-size: 14px;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#030712">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="./icon.jpg">
    <title>ZenOS - Finance Intelligence</title>
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        html, body {
            overscroll-behavior-y: none; /* Impede pull-to-refresh */
            overscroll-behavior-x: none;
            height: 100%;
            overflow: hidden; /* O App.tsx gerencia o scroll interno */
            overflow-x: hidden; /* Impede scroll horizontal em mobile */
            max-width: 100vw;
        }
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        /* Glass effect adaptive */
        .glass { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(0,0,0,0.05); 
        }
        .dark .glass {
            background: rgba(15, 23, 42, 0.7); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        
        input, button, select, textarea { font-size: 16px !important; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.4); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(99, 102, 241, 0.6); border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
        body { scrollbar-width: thin; scrollbar-color: rgba(99, 102, 241, 0.4) transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        
        /* Previne glitches (como linhas horizontais roxas/azuis) de renderização por GPU em dispositivos móveis */
        body, html {
            background-color: #030712 !important; /* Força fundo escuro nativo */
        }
        @media (prefers-color-scheme: light) {
            body, html {
                background-color: #f8fafc !important; /* Ajusta conforme o prefered scheme */
            }
        }
        
        /* Otimização de GPU para animações */
        .animate-in {
            will-change: transform, opacity;
            transform: translate3d(0, 0, 0);
            -webkit-transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
</head>
<body class="bg-slate-50 dark:bg-[#030712] text-[#212529] dark:text-slate-200 transition-colors duration-300">
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => {
              console.log('ZenOS PWA Service Worker registrado com sucesso no escopo:', reg.scope);
            })
            .catch((err) => {
              console.warn('Falha ao registrar Service Worker:', err);
            });
        });
      }
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
